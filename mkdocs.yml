extra_css:
  - stylesheets/extra.css
extra:
  generator: false
  social:
    - icon: fontawesome/brands/discord
      link: 404.html
    - icon: fontawesome/brands/github
      link: https://github.com/VectorInstitute/AgentFinVQA
repo_url: https://github.com/VectorInstitute/AgentFinVQA
repo_name: VectorInstitute/AgentFinVQA
site_name: AgentFinVQA
plugins:
  - search
theme:
  custom_dir: docs/overrides
  favicon: assets/favicon-48x48.svg
  features:
    - navigation.footer
    - navigation.top
    - search.suggest
    - search.highlight
  icon:
    repo: fontawesome/brands/github
  logo: assets/vector-logo.svg
  logo_footer: assets/vector-logo.svg
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: vector
      accent: vector-teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: vector-teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
